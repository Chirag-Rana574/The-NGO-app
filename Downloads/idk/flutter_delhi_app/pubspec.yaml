name: delhi_legal_assistant
description: Delhi Courts Legal Assistant Pro - Blue Dark Mode Mobile App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  flutter_staggered_animations: ^1.1.1
  url_launcher: ^6.3.2
  uuid: ^4.5.1
  pdf: ^3.11.0
  printing: ^5.13.1
  syncfusion_flutter_pdf: ^25.1.37
  # New dependencies for Legal Assistant Pro
  http: ^1.2.0
  dio: ^5.7.0
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  pdfx: ^2.6.0
  path_provider: ^2.1.4
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  file_picker: ^8.0.0
  # flutter_tesseract_ocr: ^1.5.0  # Removed - package not available on pub.dev
  supabase_flutter: ^2.8.0
  envied: ^0.5.4+1
  share_plus: ^7.0.0
  flutter_animate: ^4.5.0
  sentry_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  # Code generation dependencies
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/
    - assets/templates/
