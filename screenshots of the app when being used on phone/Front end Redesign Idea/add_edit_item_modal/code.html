<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "surface": "#f8f9fa",
                        "on-primary-fixed-variant": "#004395",
                        "on-primary-container": "#fefcff",
                        "surface-tint": "#005ac2",
                        "surface-container-low": "#f3f4f5",
                        "surface-dim": "#d9dadb",
                        "surface-container-high": "#e7e8e9",
                        "tertiary": "#6b38d4",
                        "on-secondary": "#ffffff",
                        "primary-container": "#2170e4",
                        "outline-variant": "#c2c6d6",
                        "primary": "#0058be",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#dce2f3",
                        "secondary": "#585f6c",
                        "on-surface-variant": "#424754",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#d8e2ff",
                        "background": "#f8f9fa",
                        "on-tertiary-fixed-variant": "#5516be",
                        "inverse-primary": "#adc6ff",
                        "on-secondary-container": "#5e6572",
                        "on-tertiary-container": "#fffbff",
                        "on-error": "#ffffff",
                        "on-background": "#191c1d",
                        "on-surface": "#191c1d",
                        "error": "#ba1a1a",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#edeeef",
                        "on-primary-fixed": "#001a42",
                        "on-secondary-fixed": "#151c27",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed-variant": "#404754",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#c0c7d6",
                        "on-tertiary-fixed": "#23005c",
                        "inverse-surface": "#2e3132"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #0058be 0%, #2170e4 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased">
<!-- Backdrop Layout -->
<div class="fixed inset-0 bg-on-background/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
<!-- Add/Edit Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.2)] overflow-hidden flex flex-col">
<!-- Modal Header -->
<div class="px-8 pt-10 pb-6">
<div class="flex items-center justify-between mb-2">
<span class="text-primary font-headline font-extrabold tracking-tighter text-sm uppercase">Clinical Curator</span>
<button class="text-secondary hover:bg-surface-container-high p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<h1 class="font-headline text-3xl font-bold text-on-surface tracking-tight">Edit Patient Profile</h1>
<p class="text-on-surface-variant mt-1 text-sm">Update clinical records and personal identification.</p>
</div>
<!-- Modal Content / Form -->
<div class="px-8 py-4 space-y-8">
<!-- Large Input Section -->
<div class="space-y-3">
<label class="block font-label text-[11px] font-semibold uppercase tracking-wider text-secondary" for="patient-name">
                        Full Legal Name
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-2xl px-6 py-5 text-xl font-medium text-on-surface placeholder-outline-variant focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all" id="patient-name" placeholder="Enter full name" type="text" value="Elena Rodriguez"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-primary/40 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
</div>
</div>
<!-- Secondary Info Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-3">
<label class="block font-label text-[11px] font-semibold uppercase tracking-wider text-secondary">Identification ID</label>
<div class="bg-surface-container-low rounded-2xl px-6 py-4 flex items-center gap-3">
<span class="material-symbols-outlined text-secondary">badge</span>
<input class="bg-transparent border-none p-0 focus:ring-0 text-on-surface font-medium w-full" type="text" value="P-992384"/>
</div>
</div>
<div class="space-y-3">
<label class="block font-label text-[11px] font-semibold uppercase tracking-wider text-secondary">Role / Status</label>
<div class="bg-surface-container-low rounded-2xl px-6 py-4 flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">emergency</span>
<select class="bg-transparent border-none p-0 focus:ring-0 text-on-surface font-medium w-full appearance-none">
<option>Active Patient</option>
<option>Field Worker</option>
<option>Medical Staff</option>
</select>
</div>
</div>
</div>
<!-- Profile Image Selection (Editorial Style) -->
<div class="space-y-4">
<label class="block font-label text-[11px] font-semibold uppercase tracking-wider text-secondary">Patient Photography</label>
<div class="flex items-center gap-6">
<div class="relative group h-24 w-24">
<img alt="Profile" class="h-24 w-24 rounded-2xl object-cover ring-4 ring-primary/10" data-alt="close-up portrait of a serious woman in a clinical setting with soft natural light and professional background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6e5qyV-Z3KoWpEiLK-rjJoK_AIxr48QeirWdB_trPzOsjf1NTFcdPmR0yMMnAGFekNCYCuQ0zRAxKhUkluibLx9SDiJQdFJpUNp9Cn5G-hzGlAA3H85O-ykrOopGwQWv9c2cOYMi1o4BU8gVK5h-A8IlC2jTbjvf9FK1HJvpVtnz_ToWs3L8HY4jHSKwL_xbnh7o72DjQgcxufDHm0lQVvbmrN6LC1theo6LLudu8isGrCuvDShD1LEE5OBL7L-IZWLpP5dLI9g"/>
<div class="absolute inset-0 bg-on-background/40 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-white">photo_camera</span>
</div>
</div>
<div class="flex-1 space-y-2">
<button class="text-primary font-semibold text-sm hover:underline flex items-center gap-2">
<span class="material-symbols-outlined text-lg">upload</span>
                                Update photo
                            </button>
<p class="text-xs text-on-surface-variant">Recommended: Clear face shot, neutral lighting. Max 5MB.</p>
</div>
</div>
</div>
</div>
<!-- Modal Actions -->
<div class="mt-8 px-8 pb-10 flex flex-col sm:flex-row gap-4">
<button class="flex-1 order-2 sm:order-1 bg-surface-container-high hover:bg-surface-container-highest text-secondary font-headline font-bold py-5 rounded-full transition-all flex items-center justify-center gap-2">
                    Cancel
                </button>
<button class="flex-[2] order-1 sm:order-2 bg-gradient-primary text-white font-headline font-bold py-5 rounded-full shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Save Changes
                </button>
</div>
</div>
</div>
<!-- Background Content (Simulating the App Screen underneath) -->
<div class="p-8 opacity-40 blur-md pointer-events-none select-none">
<header class="flex justify-between items-center mb-12">
<h1 class="text-4xl font-headline font-bold">Clinical Dashboard</h1>
</header>
<div class="grid grid-cols-3 gap-6">
<div class="h-40 bg-surface-container rounded-3xl"></div>
<div class="h-40 bg-surface-container rounded-3xl"></div>
<div class="h-40 bg-surface-container rounded-3xl"></div>
</div>
<div class="mt-12 space-y-6">
<div class="h-24 bg-surface-container rounded-3xl"></div>
<div class="h-24 bg-surface-container rounded-3xl"></div>
<div class="h-24 bg-surface-container rounded-3xl"></div>
</div>
</div>
</body></html>
