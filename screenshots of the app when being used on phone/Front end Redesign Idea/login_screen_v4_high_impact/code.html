<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vitalis NGO - Clinical Curator Login</title>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#191c1d",
              "tertiary-fixed": "#e9ddff",
              "on-tertiary-container": "#fffbff",
              "on-secondary-fixed-variant": "#404754",
              "secondary-fixed-dim": "#c0c7d6",
              "primary-container": "#2170e4",
              "on-secondary-fixed": "#151c27",
              "tertiary": "#6b38d4",
              "inverse-on-surface": "#f0f1f2",
              "surface-tint": "#005ac2",
              "on-tertiary-fixed": "#23005c",
              "inverse-surface": "#2e3132",
              "tertiary-container": "#8455ef",
              "inverse-primary": "#adc6ff",
              "outline-variant": "#c2c6d6",
              "surface-container": "#edeeef",
              "primary": "#0058be",
              "surface-variant": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "primary-fixed": "#d8e2ff",
              "tertiary-fixed-dim": "#d0bcff",
              "surface-bright": "#f8f9fa",

              "error": "#ba1a1a",

              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1.25rem", "full": "9999px"},

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-medical-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .bg-plus-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='24' height='24' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6z' fill='%23ffffff' fill-opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-primary min-h-screen flex flex-col font-body antialiased selection:bg-white/20 relative overflow-hidden">
<!-- Rich Gradient Background with Patterns -->
<div class="absolute inset-0 bg-gradient-to-br from-[#004395] via-[#0058be] to-[#0066cc] z-0"></div>
<div class="absolute inset-0 bg-medical-pattern z-0 opacity-40"></div>
<div class="absolute inset-0 bg-plus-pattern z-0"></div>
<!-- Centered Content Wrapper -->
<main class="relative z-10 flex-grow flex flex-col items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[440px] flex flex-col items-center space-y-8">
<!-- Branding Header (Above Card) -->
<header class="text-center text-white mb-4">
<div class="inline-flex items-center justify-center bg-white/10 backdrop-blur-md rounded-2xl p-6 shadow-xl mb-6 border border-white/20">
<div class="relative">
<span class="text-6xl leading-none">💊</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-[40px] tracking-tight leading-tight mb-1">
                    Vitalis NGO
                </h1>
<p class="font-headline font-bold text-xs text-white/70 tracking-[0.3em] uppercase">
                    Administration System
                </p>
</header>
<!-- Crisp White Login Card -->
<section class="w-full bg-white rounded-[2rem] p-8 sm:p-10 shadow-[0_40px_80px_-20px_rgba(0,0,0,0.3)]">
<div class="text-center mb-10">
<h2 class="font-headline font-bold text-[24px] text-on-background mb-2">
                        Welcome Back
                    </h2>
<p class="text-on-surface-variant text-[15px] leading-relaxed max-w-[280px] mx-auto opacity-80">
                        Authenticate to access the pharmacy management portal.
                    </p>
</div>
<!-- Login Actions -->
<div class="space-y-6">
<!-- Premium Google Sign-in Button -->
<button class="w-full flex items-center justify-center gap-3 bg-white border border-[#dadce0] py-3.5 px-6 rounded-xl hover:bg-gray-50 transition-all duration-200 active:scale-[0.98] shadow-sm">
<svg class="w-5 h-5 shrink-0" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-1.01.68-2.31 1.09-3.71 1.09-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body font-semibold text-[#3c4043] text-[15px]">
                            Sign in with Google
                        </span>
</button>
<!-- Divider -->
<div class="relative flex items-center">
<div class="flex-grow border-t border-surface-variant/30"></div>
<span class="flex-shrink mx-4 text-[11px] font-bold text-outline/50 uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-surface-variant/30"></div>
</div>
<!-- Developer Link -->
<div class="flex flex-col items-center">
<a class="group inline-flex items-center gap-2 text-primary font-bold text-[14px] hover:text-primary-container transition-colors p-2" href="#">
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:rotate-12">terminal</span>
                            Continue without Google (Dev)
                        </a>
</div>
</div>
<!-- Footer Note inside card -->
<div class="mt-10 pt-6 border-t border-surface-variant/20">
<p class="text-[12px] text-on-surface-variant/60 text-center leading-relaxed">
                        Restricted access for NGO personnel.
                    </p>
</div>
</section>
<!-- Minimal Page Footer -->
<footer class="pt-4 flex flex-col items-center gap-3">
<div class="flex items-center gap-4 text-white/50 font-label tracking-[1.2px] text-[10px] font-bold uppercase">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">verified_user</span>
                        SECURE NODE
                    </div>
<div class="w-1 h-1 bg-white/30 rounded-full"></div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">code</span>
                        V2.4.0-STABLE
                    </div>
</div>
</footer>
</div>
</main>
<!-- Bottom Light Effect -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full h-[300px] bg-white/5 blur-[100px] rounded-full -mb-40 z-0"></div>
</body></html>
